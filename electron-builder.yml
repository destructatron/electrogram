appId: com.destructatron.electrogram
productName: Electrogram
copyright: Copyright © 2026
directories:
  output: dist
  buildResources: build-resources
files:
  - out/**/*
  - package.json
extraMetadata:
  main: ./out/main/index.js
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.social-networking
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    NSUserNotificationAlertStyle: alert
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
  category: Network
  maintainer: destructatron
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
