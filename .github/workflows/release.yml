name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TARGET="${TAG#v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$TARGET" ]; then
            npm version "$TARGET" --no-git-tag-version
          fi

      - name: Build
        run: npm run build

      - name: Build & Publish (Linux)
        run: npm run dist:linux -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          $tag = "${env:GITHUB_REF}" -replace "refs/tags/",""
          $target = $tag -replace "^v",""
          $current = (Get-Content package.json | ConvertFrom-Json).version
          if ($current -ne $target) {
            npm version $target --no-git-tag-version
          }

      - name: Build
        run: npm run build

      - name: Build & Publish (Windows)
        run: npm run dist:win -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TARGET="${TAG#v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$TARGET" ]; then
            npm version "$TARGET" --no-git-tag-version
          fi

      - name: Build
        run: npm run build

      - name: Build & Publish (macOS)
        run: npm run dist:mac -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
