name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Linux)
        run: npm run dist:linux -- --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrogram-linux
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Windows)
        run: npm run dist:win -- --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrogram-windows
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (macOS)
        run: npm run dist:mac -- --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrogram-macos
          path: dist/*
